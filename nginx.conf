server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # This server only serves the static viewer. API calls go straight from the browser to the
    # engine's web API (configured via VITE_API_BASE_URL at build time), which allows this origin
    # through CORS, so there is no /rulegraph-api proxy here.

    # Single-page app: fall back to index.html for client-side routing.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
