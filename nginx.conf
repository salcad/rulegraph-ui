server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # This container only serves the static viewer. The browser calls /rulegraph-api/* same-origin;
    # the host's nginx reverse proxy (the public entry point) routes /rulegraph-api/ to the engine on
    # 127.0.0.1:8074 and everything else here, so there is no /rulegraph-api proxy inside the container.
    # See README "Backend API URL" for the host nginx server block.

    # Single-page app: fall back to index.html for client-side routing.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
