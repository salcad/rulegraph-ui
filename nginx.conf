server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # This container only serves the static viewer. The browser calls /rulegraph-api/* same-origin;
    # the host's nginx reverse proxy (the public entry point) routes /rulegraph-api/ to the engine on
    # 127.0.0.1:8074 and everything else here, so there is no /rulegraph-api proxy inside the container.
    # See README "Backend API URL" for the host nginx server block.

    # Serve ES module files with a JavaScript MIME type. The default nginx mime.types has no .mjs
    # mapping, so without this the pdf.js worker (assets/pdf.worker.min-*.mjs) is sent as
    # application/octet-stream; the browser then refuses to import it as a module and "view PDF"
    # fails with "Setting up fake worker failed".
    location ~ \.mjs$ {
        default_type text/javascript;
    }

    # Single-page app: fall back to index.html for client-side routing.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
