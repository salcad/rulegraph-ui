# Front-end module: builds the static viewer and serves it with nginx. Deploy this alongside the
# backend module (../rulegraph-engine/docker-compose.yml); the two run as independent stacks behind
# the host's nginx vhost, which is the single public entry point.
#
#   docker compose up -d --build      # build and start the UI
#   docker compose down               # stop
#
# The browser calls /rulegraph-api/* as SAME-ORIGIN relative paths (VITE_API_BASE_URL stays ""), and
# the host nginx routes /rulegraph-api/ to the backend and everything else here. No CORS, no API URL
# baked into the build. See ../rulegraph-engine/deploy/README.md for the vhost and TLS.
services:
  ui:
    build:
      context: .
      args:
        # Empty base URL => the bundle calls /rulegraph-api/ on the current origin (proxied to the
        # backend by the host nginx). Same-origin, no CORS.
        VITE_API_BASE_URL: ""
    container_name: rulegraph-ui
    # Loopback only: reached via the host nginx `location /` proxy, never directly from the internet.
    ports:
      - "127.0.0.1:8073:80"
    restart: unless-stopped
